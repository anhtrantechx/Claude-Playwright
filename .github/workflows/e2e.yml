# Run Playwright when developers add/update e2e/*.spec.ts
#
# Flow:
#   commit *.spec.ts → push / PR → install → playwright test → ✅/❌
# Note: E2E specs only use @playwright/test — no tsup build (avoids DTS OOM on runner).

name: E2E (Playwright)

on:
  push:
    branches: [main, master]
    paths:
      - 'e2e/**'
      - 'playwright.e2e.config.ts'
      - 'package.json'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'e2e/**'
      - 'playwright.e2e.config.ts'
      - 'package.json'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: true
      XOPS_PORTAL_URL: ${{ vars.XOPS_PORTAL_URL || 'https://perf-portal-dev.xops-core-platform.techxdata.io/?period_id=M05+-+FY2026' }}
      PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL || 'https://example.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests (e2e/*.spec.ts)
        run: npm run test:e2e -- e2e/xops-leader-scorecard.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/e2e/
          retention-days: 7
          if-no-files-found: ignore
